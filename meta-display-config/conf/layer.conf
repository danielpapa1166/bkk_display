# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-display-config"
BBFILE_PATTERN_meta-display-config = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-display-config = "6"

LAYERDEPENDS_meta-display-config = "core raspberrypi"
LAYERSERIES_COMPAT_meta-display-config = "kirkstone"
