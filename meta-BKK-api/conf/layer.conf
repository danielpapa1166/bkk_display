# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-BKK-api"
BBFILE_PATTERN_meta-BKK-api = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-BKK-api = "6"

LAYERDEPENDS_meta-BKK-api = "core openembedded-layer"
LAYERSERIES_COMPAT_meta-BKK-api = "kirkstone"
