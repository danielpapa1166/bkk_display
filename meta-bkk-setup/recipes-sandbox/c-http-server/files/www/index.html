<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BKK Display Setup</title>
  <link rel="stylesheet" href="/styles.css">
</head>
<body>
  <main class="setup-card">
    <h1>BKK Display Setup</h1>

    <div id="page-wifi" class="page">
      <h2>WiFi Configuration</h2>
      <label for="wifi-ssid">SSID:</label>
      <input type="text" id="wifi-ssid">

      <label for="wifi-password">Password:</label>
      <input type="password" id="wifi-password">

      <div class="actions">
        <button onclick="showPage('api-key')">Next</button>
      </div>
    </div>

    <div id="page-api-key" class="page" style="display:none">
      <h2>BKK API Key</h2>
      <label for="api-key">API Key:</label>
      <input type="text" id="api-key">

      <div class="actions two-cols">
        <button class="secondary" onclick="showPage('wifi')">Back</button>
        <button onclick="showPage('stations')">Next</button>
      </div>
    </div>

    <div id="page-stations" class="page" style="display:none">
      <h2>Station Configuration</h2>
      <label for="station-ids">Station IDs (comma-separated):</label>
      <input type="text" id="station-ids" placeholder="e.g. F02261,F02122">

      <div class="actions two-cols">
        <button class="secondary" onclick="showPage('api-key')">Back</button>
        <button onclick="finish()">Finish</button>
      </div>
    </div>
  </main>

  <script src="/app.js"></script>
</body>
</html>
