# We have a conf and classes directory, add to BBPATH
BBPATH .= ":${LAYERDIR}"

# We have recipes-* directories, add to BBFILES
BBFILES += "${LAYERDIR}/recipes-*/*/*.bb \
            ${LAYERDIR}/recipes-*/*/*.bbappend"

BBFILE_COLLECTIONS += "meta-bkk-setup"
BBFILE_PATTERN_meta-bkk-setup = "^${LAYERDIR}/"
BBFILE_PRIORITY_meta-bkk-setup = "6"

LAYERDEPENDS_meta-bkk-setup = "core"
LAYERSERIES_COMPAT_meta-bkk-setup = "kirkstone"
